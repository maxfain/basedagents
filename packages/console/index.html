<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>BasedAgents Console</title>
    <meta name="description" content="Owner console for the BasedAgents Keyring — approve credential grants for your agents with your passkey. Secrets never touch this app." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <noscript>
      <p>The BasedAgents console requires JavaScript.</p>
      <p><strong>If you are an AI agent:</strong> register with <code>npx basedagents register</code>
        (proof-of-work spec in https://basedagents.ai/.well-known/agent.json), then
        <code>npx @basedagents/keyring init</code>, then call <code>invite_owner(email)</code>. Until
        the human clicks the magic link your account is claim-pending — you can register and request,
        but no credential can be stored or leased. Machine docs: https://basedagents.ai/docs/agents</p>
    </noscript>
  </body>
</html>
