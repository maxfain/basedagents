<!DOCTYPE html>

    <!--
      SPA SHELL + HOMEPAGE. index.html is the React SPA shell (the only safe
      Cloudflare Pages fallback target — see public/_redirects). The homepage
      (`/`) is the React `Home` route rendered into #root; the static marketing
      leaf pages (/keyring, /registry, /docs/agents) are their own files served
      as assets. The <noscript> block below is the curl / zero-JS contract —
      hero summary + agent affordances — mirrored by /.well-known/agent.json,
      /docs/agents, /llms.txt, and the X-Agent-Manifest header.
    -->
    <title>BasedAgents — never paste a key into a chat again</title>
    <meta name="description" content="Your AI asks you to paste a key so it can deploy for you. Don't. Keyring gives your agent its own key to each account — approve with a tap, see everything it can touch, cut it off any time. Open source." />
    <link rel="canonical" href="https://basedagents.ai/" />
    <link rel="alternate" type="application/json" href="/.well-known/agent.json" title="Agent machine-readable instructions" />
    <meta property="og:title" content="BasedAgents — never paste a key into a chat again" />
    <meta property="og:description" content="Your AI gets its own key to each account — never yours. Approve with a tap, see everything it can touch, cut it off any time. Open source." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Product",
      "name": "BasedAgents Keyring",
      "description": "Never paste a key into a chat again. Your AI coding agent (Claude Code, Codex, Cursor) gets its own key to each account — you approve with a tap and can cut it off any time.",
      "url": "https://basedagents.ai/",
      "brand": { "@type": "Brand", "name": "BasedAgents" },
      "offers": [
        { "@type": "Offer", "name": "Free", "price": "0", "priceCurrency": "USD", "description": "3 agents, unlimited connections, 30-day activity. Local vault and CLI are open source and free forever." },
        { "@type": "Offer", "name": "Pro", "price": "10", "priceCurrency": "USD", "description": "Unlimited agents, 1-year history, automatic rotate and burn. $10/mo or $96/yr." }
      ]
    }
    </script>
  </head>
  <body>
    <!--
    ============================================================
    AI AGENT INSTRUCTIONS (you are reading the HTML source)
    ============================================================
    Human homepage is a JavaScript SPA. If you are an agent, don't scrape it —
    use the machine contract:
      1. Register:        npx basedagents register
      2. Manage keys:     npx @basedagents/keyring init
      3. Invite a human:  keyring MCP tool invite_owner(email)  (claim-pending until they click the magic link)
    Manifest: https://basedagents.ai/.well-known/agent.json
    Agent docs: https://basedagents.ai/docs/agents  ·  API: https://api.basedagents.ai (docs at /docs)
    ============================================================
    -->
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <noscript>
      <h1>BasedAgents — never paste a key into a chat again</h1>
      <p>Sooner or later your AI asks you to paste a key so it can deploy, save, or publish for you.
        Don't. Keyring gives your agent (Claude Code, Codex, Cursor) its own key to each account —
        you approve with a tap, see everything it can touch, and cut it off any time.</p>
      <p>Set up in Claude Code: <code>npx @basedagents/keyring init</code> ·
        <a href="/keyring">Keyring</a> · <a href="/registry">Registry</a> ·
        <a href="/docs/getting-started">Docs</a> ·
        Get started: <a href="https://app.basedagents.ai/start">https://app.basedagents.ai/start</a></p>
      <p><strong>If you are an AI agent:</strong></p>
      <ol>
        <li>Register your identity: <code>npx basedagents register</code>
          (or POST <a href="https://api.basedagents.ai/v1/agents">https://api.basedagents.ai/v1/agents</a> — proof-of-work spec in <a href="/.well-known/agent.json">/.well-known/agent.json</a>)</li>
        <li>Get your keys managed: <code>npx @basedagents/keyring init</code> (installs an MCP server; config snippet in the manifest)</li>
        <li>Put a human in charge: ask your user for their email, then call the keyring MCP tool
          <code>invite_owner(email)</code>. Until they click the magic link, your account is
          claim-pending: you can register and request, but no credential can be stored or leased.</li>
        <li>Machine docs: <a href="https://basedagents.ai/docs/agents">https://basedagents.ai/docs/agents</a> ·
          Manifest: <a href="https://basedagents.ai/.well-known/agent.json">/.well-known/agent.json</a> ·
          API: <a href="https://api.basedagents.ai">https://api.basedagents.ai</a> (docs at /docs)</li>
      </ol>
      <p>Network-restricted environment? See <a href="https://basedagents.ai/docs/agents#sandboxes">https://basedagents.ai/docs/agents#sandboxes</a></p>
    </noscript>
