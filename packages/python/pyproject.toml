[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "basedagents"
version = "0.4.1"
description = "Python SDK for basedagents.ai — cryptographic identity and reputation registry for AI agents"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.9"
authors = [{ name = "basedagents.ai" }]
keywords = ["ai", "agents", "identity", "reputation", "cryptography", "registry"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Security :: Cryptography",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "cryptography>=41.0",
    "httpx>=0.25",
]

[project.optional-dependencies]
dev = ["pytest", "pytest-httpx", "mypy", "ruff"]

[project.scripts]
basedagents = "basedagents.cli:main"

[project.urls]
Homepage = "https://basedagents.ai"
Repository = "https://github.com/maxfain/basedagents"
Documentation = "https://basedagents.ai/docs/getting-started"

[tool.setuptools.packages.find]
where = ["."]
include = ["basedagents*"]

[tool.ruff]
line-length = 100

[tool.mypy]
strict = true
