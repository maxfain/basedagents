name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Manual re-kick (field-hit): a runner wedged 25 minutes in "Install
  # Chromium", the run had to be cancelled, and re-deploying main required a
  # new commit. Dispatch reruns the whole pipeline — including the deploys,
  # which run on main regardless of what triggered the workflow.
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: Typecheck, lint, test, build (Node)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build all workspaces
        run: npm run build

      # The MCP server ships a vendored (esbuild-bundled) stdio slice of the
      # MCP SDK. Unit tests exercise src against the devDependency, so drive
      # the BUILT server over real stdio to prove the bundle actually runs.
      - name: MCP stdio smoke (vendored SDK bundle)
        run: npm run smoke:mcp --workspace=packages/keyring

  smoke:
    name: Clean-container smoke (packed npx install)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      # Pack the published packages and drive `basedagents keyring init` and
      # `@basedagents/keyring init` from a fresh project — catches dist/bin/alias
      # breakage that source-tree unit tests never see. Also enforces the §4.6
      # static-dependency rule: `basedagents` declares @basedagents/keyring, and
      # `basedagents keyring init` runs inside a network-disabled namespace
      # (unshare -rn) to prove zero network calls with warm node_modules.
      - name: Clean-container smoke test (incl. offline keyring init)
        run: npm run smoke

  python:
    name: Test (Python SDK)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install
        run: pip install -e "packages/python[dev]"

      - name: Test
        run: pytest packages/python/tests -q

  e2e:
    name: Passkey E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      # The spec imports @basedagents/keyring (workspace link → packages/
      # keyring/dist), which does not exist on a fresh checkout until built.
      - name: Build keyring dist
        run: npm run build:dist --workspace=packages/keyring

      - name: Install Chromium
        run: npx playwright install chromium --with-deps
        working-directory: packages/console

      - name: Run passkey E2E
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            packages/console/playwright-report/
            packages/console/test-results/
          retention-days: 7

  # ── PR: deploy a console preview to Cloudflare Pages and comment the URL ──
  # Skipped for forks (no secrets) — previews are for same-repo branches.
  # NOTE: passkey ceremonies do NOT work on *.pages.dev previews by design
  # (the WebAuthn RP ID is basedagents.ai) — previews are for UI review.
  preview:
    name: Console preview deploy
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    needs: [node]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build console
        run: npm run build --workspace=packages/console

      - name: Deploy preview to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          wranglerVersion: "4.111.0"  # pin a current wrangler; the action's v3 default (3.90.0) is ~1.5y old
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy packages/console/dist --project-name basedagents-console --branch "${{ github.head_ref }}"

      - name: Comment preview URL on the PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = `${{ steps.deploy.outputs.deployment-url }}`;
            if (!url) return;
            const marker = '<!-- console-preview-url -->';
            const body = `${marker}\n🔎 **Console preview:** ${url}\n\n_(Passkey ceremonies only work on app.basedagents.ai — previews are for UI review.)_`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
            }

  # ── main: gates green → migrations → Worker → console. Zero manual steps. ──
  deploy-production:
    name: Deploy production (API + console)
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    needs: [node, python, e2e]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      # Fail fast, with a message that names the actual problem, before any
      # deploy step runs. An unset GitHub secret silently becomes an empty
      # string, and wrangler's own error ("set CLOUDFLARE_API_TOKEN") cannot
      # tell you WHICH side is misconfigured. Common trap: values added under
      # the "Variables" tab instead of "Secrets" also arrive empty here.
      - name: Verify Cloudflare credentials
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          fail=0
          if [ -z "$CF_TOKEN" ]; then
            echo "::error::Secret CLOUDFLARE_API_TOKEN is unset or empty. Add it under Settings → Secrets and variables → Actions → SECRETS tab (not Variables), exact name CLOUDFLARE_API_TOKEN."
            fail=1
          fi
          if [ -z "$CF_ACCOUNT" ]; then
            echo "::error::Secret CLOUDFLARE_ACCOUNT_ID is unset or empty. Add it under Settings → Secrets and variables → Actions → SECRETS tab (not Variables), exact name CLOUDFLARE_ACCOUNT_ID."
            fail=1
          fi
          [ "$fail" = "1" ] && exit 1
          # USER-owned tokens verify at /user/tokens/verify; ACCOUNT-owned
          # tokens (cfat_…, created under "Account API Tokens") only verify at
          # /accounts/{id}/tokens/verify. Wrangler accepts both — so must we.
          user_code=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $CF_TOKEN" https://api.cloudflare.com/client/v4/user/tokens/verify)
          if [ "$user_code" = "200" ]; then
            echo "Cloudflare credentials present; user-owned token verifies (HTTP 200)."
            exit 0
          fi
          acct_code=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $CF_TOKEN" "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/tokens/verify")
          if [ "$acct_code" = "200" ]; then
            echo "Cloudflare credentials present; account-owned token verifies (HTTP 200)."
            exit 0
          fi
          echo "::error::Cloudflare rejected the token (user verify: $user_code, account verify: $acct_code) — wrong value, revoked, expired, or the account id does not match the token's account."
          exit 1

      # Migrations FIRST — new code must never run against an old schema.
      # wrangler tracks applied migrations in the d1_migrations table; see
      # scripts/bootstrap-deploy.md for the one-time bookkeeping check.
      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          wranglerVersion: "4.111.0"  # pin a current wrangler; the action's v3 default (3.90.0) is ~1.5y old
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/api
          command: d1 migrations apply agent-registry --remote

      - name: Deploy API Worker
        uses: cloudflare/wrangler-action@v3
        with:
          wranglerVersion: "4.111.0"  # pin a current wrangler; the action's v3 default (3.90.0) is ~1.5y old
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/api
          command: deploy --name agent-registry-api

      - name: Build console
        run: npm run build --workspace=packages/console

      - name: Deploy console to Cloudflare Pages (production)
        uses: cloudflare/wrangler-action@v3
        with:
          wranglerVersion: "4.111.0"  # pin a current wrangler; the action's v3 default (3.90.0) is ~1.5y old
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy packages/console/dist --project-name basedagents-console --branch main

      # The marketing site (basedagents.ai) ships from the same merge — it went
      # stale once when only console+API were automated (a "Get started" nav
      # change sat undeployed on main).
      - name: Build marketing site
        run: npm run build --workspace=packages/web

      - name: Deploy marketing site to Cloudflare Pages (production)
        uses: cloudflare/wrangler-action@v3
        with:
          wranglerVersion: "4.111.0"
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy packages/web/dist --project-name auth-ai-web --branch main
